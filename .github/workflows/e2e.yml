name: E2E Network Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tun-e2e:
    name: TUN Device & Traffic Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify kernel TUN support (Bare-metal)
        run: |
          sudo modprobe tun
          sudo ip tuntap add dev tun-test mode tun
          sudo ip addr add 198.18.0.1/15 dev tun-test
          sudo ip link set tun-test up
          ip addr show tun-test
          # Verify Routing Tables
          sudo ip route add 8.8.8.8/32 dev tun-test
          ip route show | grep "8.8.8.8"
          sudo ip link delete tun-test

      - name: Run script idempotency checks (DRY_RUN)
        env:
          MAIN_IFACE: "eth0"
          AIRPORT_URLS_STR: "https://placeholder.test/sub"
          DASHBOARD_PORT: "9090"
          DASHBOARD_SECRET: "ci-test-secret"
          ENABLE_DASHBOARD: "0"
          AUTO_YES: "1"
        run: |
          sudo apt-get update && sudo apt-get install -y curl jq python3-yaml
          # Validate DRY_RUN doesn't apply system destructive edits
          sudo DRY_RUN=1 AUTO_YES=1 bash singbox-deploy.sh --auto-yes --dry-run 2>&1 \
            | tee /tmp/dry-run.log || true

  qemu-full-e2e:
    name: QEMU Full Stack Test (virtme-ng)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install virtme-ng and QEMU
        run: |
          sudo apt-get update
          # linux-image-generic provides the vmlinuz used by virtme (NOT the running azure kernel)
          sudo apt-get install -y qemu-system-x86 linux-image-generic iproute2
          sudo pip3 install virtme-ng --break-system-packages

      - name: Create E2E test script
        run: |
          mkdir -p tests
          cat > tests/e2e_vm_test.sh << 'VMEOF'
          #!/bin/bash
          set -euo pipefail
          # Validate TUN in VM
          ip tuntap add dev singbox_tun mode tun
          ip addr add 172.18.0.1/30 dev singbox_tun
          ip link set singbox_tun up
          # Validate Routing Tables & Marks
          ip route add default dev singbox_tun table 200
          ip rule add fwmark 0x162 table 200
          
          ip route show table 200 | grep singbox_tun || exit 1
          ip rule show | grep "0x162" || exit 1
          echo "VM E2E: ALL PASS"
          VMEOF
          chmod +x tests/e2e_vm_test.sh

      - name: Run in virtme VM
        run: |
          # ── Why these flags ──────────────────────────────────────────────────
          # 1. --installed-kernel is DEPRECATED. Use --kimg with an explicit path.
          #    The running kernel is 6.x-azure; linux-image-generic installs a
          #    separate generic vmlinuz. We find its path dynamically.
          # 2. --pwd  mounts the GitHub Actions workspace inside the VM at the
          #    same absolute path so the script can be located.
          # 3. We pass the ABSOLUTE path to --script-sh.  virtme wraps it with
          #    `sh <path>` inside the VM; a relative path fails because the VM
          #    may start in a different working directory.
          # ─────────────────────────────────────────────────────────────────────

          # Locate the generic kernel image installed above (not the azure one)
          KIMG=$(ls /boot/vmlinuz-*-generic 2>/dev/null | sort -V | tail -1)
          if [ -z "$KIMG" ]; then
            KIMG=$(ls /boot/vmlinuz-* 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using kernel image: $KIMG"

          sudo virtme-run \
            --kimg "$KIMG" \
            --mods auto \
            --pwd \
            --script-sh "$(pwd)/tests/e2e_vm_test.sh" \
            --memory 512M \
            -a loglevel=3

  watchdog-unit:
    name: Go Watchdog Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Match go.mod requirement
          go-version: "1.23"
          cache: false
      - name: Build and Test watchdog binary
        run: |
          cd cmd/watchdog
          go mod tidy
          go build -o /tmp/singbox-watchdog .
          /tmp/singbox-watchdog --test 2>&1 | grep "circuit breaker"
