name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ShellCheck
      run: sudo apt-get install -y shellcheck

    - name: Run ShellCheck on all scripts
      run: |
        echo "=== ShellCheck 扫描所有 .sh 文件 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034 "$f" || exit 1
        done
        echo "=== ShellCheck on .tpl files ==="
        for f in scripts/singbox_ruleset_weekly_update.sh.tpl; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034 "$f" || exit 1
        done

  syntax-check:
    name: Bash & Python Syntax
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Bash syntax check (bash -n)
      run: |
        echo "=== Bash 语法检查 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  bash -n $f"
          bash -n "$f"
        done

    - name: Python syntax check
      run: python3 -m py_compile scripts/singbox_build_region_groups.py

    - name: JSON template validation
      run: |
        # 展开所有模板变量后验证 JSON 是否合法
        # TUN_ADDRESS 在数组中使用，必须替换为带引号的值
        sed \
          -e 's|\${DNS_STRATEGY}|"strategy": "prefer_ipv4",|g' \
          -e 's|\${TUN_ADDRESS}|"172.18.0.1\/30"|g' \
          -e 's|\${[A-Z0-9_]*}|1400|g' \
          templates/config_template.json.tpl | jq empty

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run pure function unit tests
      run: bash tests/test_unit.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run integration test suite
      run: bash tests/test_fixes.sh

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [shellcheck, syntax-check]
    continue-on-error: true    # Docker build is supplementary; unit/integration tests already run directly
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker
      run: |
        docker info || (echo "Docker not available, skipping" && exit 0)

    - name: Build test container
      env:
        DOCKER_BUILDKIT: 0
      run: |
        docker build -f Dockerfile.test -t singbox-test . \
          --progress=plain \
          --no-cache=false

    - name: Run tests in container
      run: docker run --rm singbox-test
