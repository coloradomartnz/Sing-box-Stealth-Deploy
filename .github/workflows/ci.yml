name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ShellCheck
      run: sudo apt-get install -y shellcheck

    - name: Run ShellCheck on all scripts
      run: |
        echo "=== ShellCheck 扫描所有 .sh 文件 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034 "$f" || exit 1
        done
        echo "=== ShellCheck on .tpl files ==="
        for f in scripts/singbox_ruleset_weekly_update.sh.tpl; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034 "$f" || exit 1
        done

  syntax-check:
    name: Bash & Python Syntax
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Bash syntax check (bash -n)
      run: |
        echo "=== Bash 语法检查 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  bash -n $f"
          bash -n "$f"
        done

    - name: Python syntax check
      run: python3 -m py_compile scripts/singbox_build_region_groups.py

    - name: JSON template validation
      run: |
        # 用 sed 展开模板变量后验证 JSON
        sed -e 's|\${DNS_STRATEGY}|"strategy": "prefer_ipv4",|g' \
            -e 's|\${[A-Z_]*}|test|g' \
            templates/config_template.json.tpl | jq empty

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run pure function unit tests
      run: bash tests/test_unit.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run integration test suite
      run: bash tests/test_fixes.sh

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [shellcheck, syntax-check]
    steps:
    - uses: actions/checkout@v4

    - name: Build test container
      run: docker build -f Dockerfile.test -t singbox-test .

    - name: Run tests in container
      run: docker run --rm singbox-test

    - name: Run dry-run deployment test
      run: |
        docker run --rm singbox-test bash -c '
          export AUTO_YES=1
          export AIRPORT_URLS_STR="https://example.com/sub?token=test"
          export DRY_RUN=1
          # dry-run 模式不会实际安装，但验证全流程逻辑
          bash singbox-deploy.sh --dry-run --auto-yes 2>&1 || echo "dry-run completed with expected errors (no sing-box binary)"
        '
