name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-bpf:
    name: Build BPF CO-RE Object
    runs-on: ubuntu-24.04
    outputs:
      bpf_artifact: tproxy_tc.bpf.o
    steps:
      - uses: actions/checkout@v4

      - name: Install BPF toolchain (Clang + libbpf headers only)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev linux-headers-generic libbpf-dev
          # Dynamically install bpftool matching current kernel
          KVER=$(uname -r)
          sudo apt-get install -y linux-tools-${KVER} || \
            sudo apt-get install -y linux-tools-azure || \
            sudo apt-get install -y linux-tools-generic

      - name: Generate vmlinux.h from BTF (CO-RE 关键步骤)
        run: |
          # bpftool btf dump file /sys/kernel/btf/vmlinux format c > ebpf/vmlinux.h
          # CI 机器上 vmlinux BTF 一定存在
          bpftool btf dump file /sys/kernel/btf/vmlinux format c \
            > ebpf/vmlinux.h

      - name: Compile BPF object with BTF debug info embedded
        run: |
          clang \
            -O2 \
            -g \
            -target bpf \
            -D__TARGET_ARCH_x86 \
            -I./ebpf \
            -I/usr/include/x86_64-linux-gnu \
            -c ebpf/tproxy_tc.bpf.c \
            -o ebpf/tproxy_tc.bpf.o
          # 验证 BTF section 确实存在
          llvm-objdump -h ebpf/tproxy_tc.bpf.o | grep -E "BTF|btf"

      - name: Upload as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpf-objects
          path: ebpf/tproxy_tc.bpf.o
          retention-days: 90

  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ShellCheck
      run: sudo apt-get install -y shellcheck

    - name: Run ShellCheck on all scripts
      run: |
        echo "=== ShellCheck 扫描所有 .sh 文件 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034 "$f" || exit 1
        done
        echo "=== ShellCheck on .tpl files ==="
        for f in scripts/singbox_ruleset_weekly_update.sh.tpl; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034 "$f" || exit 1
        done

  syntax-check:
    name: Bash & Python Syntax
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Bash syntax check (bash -n)
      run: |
        echo "=== Bash 语法检查 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  bash -n $f"
          bash -n "$f"
        done

    - name: Python syntax check
      run: python3 -m py_compile scripts/singbox_build_region_groups.py

    - name: JSON template validation
      run: |
        # 展开所有模板变量后验证 JSON 是否合法
        # TUN_ADDRESS 在数组中使用，必须替换为带引号的值
        sed \
          -e 's|\${DNS_STRATEGY}|"strategy": "prefer_ipv4",|g' \
          -e 's|\${TUN_ADDRESS}|"172.18.0.1\/30"|g' \
          -e 's|\${[A-Z0-9_]*}|1400|g' \
          templates/config_template.json.tpl | jq empty

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run pure function unit tests
      run: bash tests/test_unit.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run integration test suite
      run: bash tests/test_fixes.sh

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-24.04
    needs: [shellcheck, syntax-check]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run privileged container with TUN
        run: |
          docker run --rm --privileged \
            --cap-add NET_ADMIN \
            --device /dev/net/tun \
            -v "$(pwd)":/workspace \
            ubuntu:24.04 \
            bash -c "apt-get update && apt-get install -y iproute2 kmod && bash /workspace/tests/docker_tun_smoke.sh"
