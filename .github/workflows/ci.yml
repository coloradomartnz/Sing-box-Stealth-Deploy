name: CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'          # 推送任意 v* 标签时触发发布
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-bpf:
    name: Build BPF CO-RE Object
    runs-on: ubuntu-24.04
    outputs:
      bpf_artifact: tproxy_tc.bpf.o
    steps:
      - uses: actions/checkout@v4

      - name: Install BPF toolchain (Clang + libbpf + bpftool)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libelf-dev linux-headers-generic libbpf-dev \
            libcap-dev binutils-dev git

          # Install kernel-versioned tools for the running kernel (perf, etc.).
          # NOTE: On Ubuntu 24.04, linux-tools-* packages no longer include
          # bpftool (Ubuntu Bug #2117147 / #2121230), so we cannot rely on
          # find /usr/lib/linux-tools. We build bpftool from source instead.
          KVER=$(uname -r)
          sudo apt-get install -y "linux-tools-${KVER}" "linux-cloud-tools-${KVER}" 2>/dev/null || \
            sudo apt-get install -y linux-tools-azure linux-cloud-tools-azure 2>/dev/null || true

          # Build bpftool from the official libbpf/bpftool repository.
          # This is the only reliable method on Ubuntu 24.04 Azure runners.
          git clone --quiet --depth 1 --recurse-submodules \
            https://github.com/libbpf/bpftool.git /tmp/bpftool
          make -C /tmp/bpftool/src -j$(nproc) >/dev/null
          sudo install -m 0755 /tmp/bpftool/src/bpftool /usr/local/bin/bpftool
          bpftool version

      - name: Generate vmlinux.h from BTF (CO-RE key step)
        run: |
          bpftool btf dump file /sys/kernel/btf/vmlinux format c \
            > ebpf/vmlinux.h

      - name: Compile BPF object with BTF debug info embedded
        run: |
          clang \
            -O2 \
            -g \
            -target bpf \
            -D__TARGET_ARCH_x86 \
            -I./ebpf \
            -I/usr/include/x86_64-linux-gnu \
            -c ebpf/tproxy_tc.bpf.c \
            -o ebpf/tproxy_tc.bpf.o
          llvm-objdump -h ebpf/tproxy_tc.bpf.o | grep -E "BTF|btf"

      - name: Upload as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpf-objects
          path: ebpf/tproxy_tc.bpf.o
          retention-days: 90

  # ---------------------------------------------------------------
  # 仅在推送 v* 标签时运行：创建 GitHub Release 并附加 BPF 对象
  # ---------------------------------------------------------------
  release-bpf:
    name: Create Release and Upload BPF
    needs: [build-bpf]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download compiled BPF object
        uses: actions/download-artifact@v4
        with:
          name: bpf-objects
          path: .

      - name: Publish GitHub Release with BPF attachment
        uses: softprops/action-gh-release@v2
        with:
          files: tproxy_tc.bpf.o
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ShellCheck
      run: sudo apt-get install -y shellcheck

    - name: Run ShellCheck on all scripts
      run: |
        echo "=== ShellCheck 扫描所有 .sh 文件 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034,SC2183,SC2046 "$f" || exit 1
        done
        echo "=== ShellCheck on .tpl files ==="
        for f in scripts/singbox_ruleset_weekly_update.sh.tpl; do
          echo "  检查: $f"
          shellcheck -S warning -e SC1091,SC2034,SC2183,SC2046 "$f" || exit 1
        done

  syntax-check:
    name: Bash & Python Syntax
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Bash syntax check (bash -n)
      run: |
        echo "=== Bash 语法检查 ==="
        find . -name '*.sh' -not -path './venv/*' -not -path './.git/*' | sort | while read -r f; do
          echo "  bash -n $f"
          bash -n "$f"
        done

    - name: Python syntax check
      run: python3 -m py_compile scripts/singbox_build_region_groups.py

    - name: JSON template validation
      run: |
        sed \
          -e 's|\${DNS_STRATEGY}|"strategy": "prefer_ipv4",|g' \
          -e 's|\${TUN_ADDRESS}|"172.18.0.1\/30"|g' \
          -e 's|\${[A-Z0-9_]*}|1400|g' \
          templates/config_template.json.tpl | jq empty

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run pure function unit tests
      run: bash tests/test_unit.sh

    - name: Run audit fix regression tests
      run: bash tests/test_audit_fixes.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run integration test suite
      run: bash tests/test_fixes.sh

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-24.04
    needs: [shellcheck, syntax-check]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Load TUN kernel module on host
        run: sudo modprobe tun

      - name: Run privileged container with TUN
        run: |
          docker run --rm --privileged \
            --cap-add NET_ADMIN \
            --device /dev/net/tun \
            -v "$(pwd)":/workspace \
            ubuntu:24.04 \
            bash -c "apt-get update -qq && apt-get install -y -qq iproute2 kmod && bash /workspace/tests/docker_tun_smoke.sh"
